<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#0a0a0f"/>
  <circle cx="64" cy="64" r="60" fill="url(#glow)" opacity="0.3"/>

  <!-- Left storage block -->
  <rect x="20" y="46" width="28" height="36" rx="4" fill="#34d399" opacity="0.15" stroke="#34d399" stroke-width="2.5"/>
  <line x1="26" y1="55" x2="42" y2="55" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="26" y1="62" x2="38" y2="62" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="26" y1="69" x2="40" y2="69" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Right storage block -->
  <rect x="80" y="46" width="28" height="36" rx="4" fill="#34d399" opacity="0.15" stroke="#34d399" stroke-width="2.5"/>
  <line x1="86" y1="55" x2="102" y2="55" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="86" y1="62" x2="98" y2="62" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="86" y1="69" x2="100" y2="69" stroke="#34d399" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Bridge arc connecting them -->
  <path d="M48 58 C48 38, 80 38, 80 58" stroke="#34d399" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Bridge pillars -->
  <line x1="52" y1="58" x2="52" y2="50" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="76" y1="58" x2="76" y2="50" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Bridge deck -->
  <line x1="48" y1="58" x2="80" y2="58" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Sync arrows on the bridge -->
  <path d="M58 52 L64 48 L70 52" stroke="#a7f3d0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M58 64 L64 68 L70 64" stroke="#a7f3d0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

  <!-- Subtle glow gradient -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
</svg>
